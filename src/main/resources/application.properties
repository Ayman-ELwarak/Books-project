spring.application.name=books-project

spring.datasource.url=jdbc:mysql://localhost:3306/books?createDatabaseIfNotExist=true
spring.datasource.username=springstudent
spring.datasource.password=springstudent
spring.jpa.hibernate.ddl-auto=update

#Turn Statistics on and log SQL stmts
logging.level.org.hibernate=info
logging.level.org.hibernate.SQL=debug 

spring.jpa.properties.hibernate.format_sql=true


# flyway configuration
# not work
spring.flyway.enabled=true
# we can provide a comma-separated list of one or more classpath: or filesystem: locations
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

#actuator configuration
management.endpoints.web.exposure.include=*


